<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 对话查看器</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
:root {
  --primary: #D97757;
  --primary-dark: #C4653A;
  --primary-light: #F5E6D3;
  --bg: #FAF8F5;
  --surface: #FFFFFF;
  --sand: #E8DDD3;
  --text-primary: #1A1A1A;
  --text-secondary: #4A4543;
  --text-muted: #9C9590;
  --shadow: rgba(193,165,140,0.15);
  --border: rgba(193,165,140,0.35);
  --sidebar-w: 292px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);height:100vh;overflow:hidden;display:flex}

/* ── Sidebar ── */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;box-shadow:2px 0 8px var(--shadow);z-index:10}
#sidebar-head{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
#sidebar-head h1{font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:12px;letter-spacing:-0.2px}
#import-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:9px 0;background:var(--primary);color:#fff;border:none;border-radius:24px;cursor:pointer;font-size:13px;font-weight:600;transition:background .2s,transform .1s}
#import-btn:hover{background:var(--primary-dark);transform:translateY(-1px)}
#import-btn:active{transform:none}
#file-input{display:none}
#conv-count{margin-top:8px;font-size:11px;color:var(--text-muted);text-align:center}
#conv-list{flex:1;overflow-y:auto;padding:6px 0}
#conv-list::-webkit-scrollbar{width:3px}
#conv-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.conv-item{padding:10px 14px;cursor:pointer;border-radius:8px;margin:1px 8px;border-left:3px solid transparent;transition:background .12s}
.conv-item:hover{background:var(--bg)}
.conv-item.active{background:var(--primary-light);border-left-color:var(--primary)}
.conv-name{font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.conv-meta{font-size:11px;color:var(--text-muted);display:flex;gap:8px}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}

#welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text-muted)}
#welcome .wicon{font-size:52px;opacity:.3}
#welcome p{font-size:14px;line-height:1.7;text-align:center}
#welcome .sub{font-size:12px;color:var(--text-muted);opacity:.7}

#conv-view{display:none;flex-direction:column;height:100vh}
#conv-view.active{display:flex}

/* Topbar */
#topbar{height:52px;min-height:52px;display:flex;align-items:center;gap:12px;padding:0 18px;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 1px 4px var(--shadow)}
#back-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--bg);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;color:var(--text-secondary);white-space:nowrap;transition:background .12s;font-family:inherit}
#back-btn:hover{background:var(--sand)}
#conv-title{flex:1;font-size:14px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Search bar */
#search-bar{display:flex;align-items:center;gap:7px;padding:9px 18px;background:var(--bg);border-bottom:1px solid var(--border)}
#search-input{flex:1;padding:7px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);font-size:13px;color:var(--text-primary);outline:none;transition:border-color .2s;font-family:inherit;min-width:0}
#search-input:focus{border-color:var(--primary)}
#search-input::placeholder{color:var(--text-muted)}
.sbtn{padding:6px 13px;border:none;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:background .12s;font-family:inherit;white-space:nowrap}
#do-search{background:var(--primary);color:#fff}
#do-search:hover{background:var(--primary-dark)}
.nav-btn{background:var(--surface);color:var(--text-secondary);border:1px solid var(--border);padding:6px 10px}
.nav-btn:hover:not(:disabled){background:var(--sand)}
.nav-btn:disabled{opacity:.35;cursor:default}
#search-info{font-size:12px;color:var(--text-muted);white-space:nowrap;min-width:52px;text-align:center}

/* Messages area */
#msg-container{flex:1;overflow-y:auto;background:var(--bg);position:relative}
#msg-container::-webkit-scrollbar{width:5px}
#msg-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#msg-list{padding:16px 20px}
.vspacer{display:block}

/* Message bubbles */
.msg-wrap{display:flex;margin:10px 0}
.msg-wrap.human{justify-content:flex-end}
.msg-wrap.assistant{justify-content:flex-start}
.bubble{max-width:76%;min-width:60px;border-radius:16px;padding:11px 15px;position:relative}
.human .bubble{background:var(--sand);border-bottom-right-radius:4px;box-shadow:0 1px 5px var(--shadow)}
.assistant .bubble{background:var(--surface);border-bottom-left-radius:4px;border:1px solid var(--border);box-shadow:0 1px 5px var(--shadow)}
.msg-sender{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.human .msg-sender{color:var(--primary-dark)}
.assistant .msg-sender{color:var(--text-muted)}

/* Thinking */
.think-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;padding:5px 10px;background:var(--primary-light);border-radius:8px;margin-bottom:7px;font-size:11px;color:var(--primary-dark);font-style:italic;user-select:none;transition:background .12s}
.think-toggle:hover{background:#edcfb8}
.think-arrow{font-size:9px;transition:transform .18s;display:inline-block}
.think-toggle.open .think-arrow{transform:rotate(90deg)}
.think-body{display:none;padding:9px 12px;background:var(--primary-light);border-radius:8px;margin-bottom:9px;font-size:12px;color:var(--text-secondary);font-style:italic;line-height:1.65;white-space:pre-wrap;word-break:break-word;max-height:280px;overflow-y:auto;border-left:3px solid var(--primary);opacity:.85}
.think-body.open{display:block}

/* Message text / markdown */
.msg-text{font-size:14px;line-height:1.72;color:var(--text-primary);word-break:break-word}
.msg-text p{margin-bottom:7px}
.msg-text p:last-child{margin-bottom:0}
.msg-text h1,.msg-text h2,.msg-text h3{margin:11px 0 5px;font-weight:600}
.msg-text h1{font-size:17px}
.msg-text h2{font-size:15px}
.msg-text h3{font-size:14px}
.msg-text ul,.msg-text ol{padding-left:18px;margin-bottom:7px}
.msg-text li{margin-bottom:3px}
.msg-text code{font-family:'JetBrains Mono','Söhne Mono',monospace;background:rgba(193,165,140,.18);padding:1px 5px;border-radius:4px;font-size:12px}
.msg-text pre{background:#F0EBE4;border-radius:8px;padding:11px;overflow-x:auto;margin:7px 0}
.msg-text pre code{background:none;padding:0;font-size:12.5px}
.msg-text blockquote{border-left:3px solid var(--primary);padding-left:11px;color:var(--text-secondary);margin:7px 0}
.msg-text table{border-collapse:collapse;width:100%;margin:7px 0;font-size:13px}
.msg-text th,.msg-text td{border:1px solid var(--border);padding:5px 9px;text-align:left}
.msg-text th{background:var(--sand)}
.msg-text a{color:var(--primary);text-decoration:underline}
.msg-text hr{border:none;border-top:1px solid var(--border);margin:10px 0}

/* Timestamp */
.msg-time{font-size:10px;color:var(--text-muted);margin-top:5px}
.human .msg-time{text-align:right}
.assistant .msg-time{text-align:left}

/* Search highlights */
mark.hl{background:rgba(217,119,87,.22);border-radius:2px;color:inherit;padding:0 1px}
mark.hl.cur{background:rgba(217,119,87,.60);outline:1.5px solid var(--primary)}

/* Empty / loading */
.empty{display:flex;align-items:center;justify-content:center;height:160px;color:var(--text-muted);font-size:13px}
</style>
</head>
<body>

<!-- ═══ Sidebar ═══ -->
<div id="sidebar">
  <div id="sidebar-head">
    <h1>Claude 对话查看器</h1>
    <button id="import-btn" onclick="document.getElementById('file-input').click()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      导入 JSON 文件
    </button>
    <input type="file" id="file-input" accept=".json" onchange="handleImport(event)">
    <div id="conv-count"></div>
  </div>
  <div id="conv-list"></div>
</div>

<!-- ═══ Main ═══ -->
<div id="main">
  <div id="welcome">
    <div class="wicon">💬</div>
    <p>导入 Claude 导出的 JSON 文件<br>即可浏览您的全部对话记录</p>
    <p class="sub">所有数据仅在本地处理，不上传任何内容</p>
  </div>

  <div id="conv-view">
    <div id="topbar">
      <button id="back-btn" onclick="backToList()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </button>
      <div id="conv-title"></div>
    </div>

    <div id="search-bar">
      <input type="text" id="search-input" placeholder="在此对话中搜索…" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="sbtn" id="do-search" onclick="doSearch()">搜索</button>
      <button class="sbtn nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>◀</button>
      <button class="sbtn nav-btn" id="next-btn" onclick="navigate(1)" disabled>▶</button>
      <span id="search-info"></span>
    </div>

    <div id="msg-container" onscroll="onScroll()">
      <div class="vspacer" id="sp-top"></div>
      <div id="msg-list"></div>
      <div class="vspacer" id="sp-bot"></div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let rawData = [];            // full parsed JSON array
let summaries = [];          // [{uuid, name, msgCount, lastTime, rawIdx}]
let activeMsgs = [];         // current conv messages (loaded lazily)
let activeMeta = null;

// Virtual scroll
const VS = {
  items: [],
  heights: [],
  estH: 110,      // initial estimate per item
  buffer: 6,      // extra items above/below viewport
  start: 0,
  end: 0,
};

// Thinking open state: key = "msgIdx-blockIdx"
const thinkOpen = new Set();

// Search
const SR = {
  term: '',
  // matches[i] = { msgIdx, globalIdx }
  matches: [],
  // msgOffset[msgIdx] = first globalIdx in that message
  msgOffset: {},
  cur: -1,
};

// ════════════════════════════════════════════════
//  IMPORT
// ════════════════════════════════════════════════
function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      let parsed = JSON.parse(ev.target.result);
      if (!Array.isArray(parsed)) parsed = [parsed];
      rawData = parsed;
      buildSummaries();
    } catch (err) {
      alert('JSON 解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function buildSummaries() {
  summaries = [];
  rawData.forEach((conv, rawIdx) => {
    const msgs = (conv.chat_messages || []).filter(m => getMsgText(m).trim());
    if (!msgs.length) return;
    const last = msgs[msgs.length - 1];
    summaries.push({
      uuid: conv.uuid,
      name: conv.name || '(无标题)',
      msgCount: msgs.length,
      lastTime: fmtTime(last.created_at || conv.updated_at),
      rawIdx,
    });
  });
  renderList();
  document.getElementById('conv-count').textContent =
    summaries.length + ' 个对话';
}

// ════════════════════════════════════════════════
//  CONVERSATION LIST
// ════════════════════════════════════════════════
function renderList() {
  const el = document.getElementById('conv-list');
  if (!summaries.length) {
    el.innerHTML = '<div class="empty">无有效对话</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  summaries.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'conv-item';
    div.dataset.li = i;
    div.innerHTML =
      `<div class="conv-name">${esc(s.name)}</div>` +
      `<div class="conv-meta"><span>${s.msgCount} 条消息</span><span>${s.lastTime}</span></div>`;
    div.addEventListener('click', () => openConv(i));
    frag.appendChild(div);
  });
  el.innerHTML = '';
  el.appendChild(frag);
}

// ════════════════════════════════════════════════
//  OPEN / CLOSE CONVERSATION
// ════════════════════════════════════════════════
function openConv(listIdx) {
  const meta = summaries[listIdx];
  activeMeta = meta;

  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.conv-item[data-li="${listIdx}"]`);
  if (item) item.classList.add('active');

  // Lazy-load messages
  const raw = rawData[meta.rawIdx];
  activeMsgs = (raw.chat_messages || []).filter(m => getMsgText(m).trim());

  resetSearch();
  thinkOpen.clear();

  document.getElementById('conv-title').textContent = meta.name;
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('conv-view').classList.add('active');

  initVS(activeMsgs);
}

function backToList() {
  document.getElementById('conv-view').classList.remove('active');
  document.getElementById('welcome').style.display = 'flex';
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  resetSearch();
  thinkOpen.clear();
  activeMsgs = [];
  activeMeta = null;
}

// ════════════════════════════════════════════════
//  VIRTUAL SCROLL ENGINE
// ════════════════════════════════════════════════
function initVS(items) {
  VS.items = items;
  VS.heights = new Array(items.length).fill(VS.estH);
  VS.start = 0;
  VS.end = 0;
  const c = document.getElementById('msg-container');
  c.scrollTop = 0;
  renderVS();
}

function onScroll() {
  renderVS();
}

function renderVS() {
  const c = document.getElementById('msg-container');
  const scrollTop = c.scrollTop;
  const viewH = c.clientHeight;
  const n = VS.heights.length;

  if (!n) {
    document.getElementById('msg-list').innerHTML = '';
    document.getElementById('sp-top').style.height = '0';
    document.getElementById('sp-bot').style.height = '0';
    return;
  }

  // Find start index (first item visible)
  let cumH = 0, start = 0;
  for (let i = 0; i < n; i++) {
    if (cumH + VS.heights[i] > scrollTop) { start = i; break; }
    cumH += VS.heights[i];
    start = i + 1;
  }

  // Find end index (last item visible)
  let end = start, h = 0;
  while (end < n && h < viewH + 200) { h += VS.heights[end]; end++; }

  // Apply buffer
  start = Math.max(0, start - VS.buffer);
  end = Math.min(n, end + VS.buffer);
  VS.start = start;
  VS.end = end;

  // Compute spacer heights
  let topH = 0;
  for (let i = 0; i < start; i++) topH += VS.heights[i];
  let totalH = VS.heights.reduce((a, b) => a + b, 0);
  let rendH = 0;
  for (let i = start; i < end; i++) rendH += VS.heights[i];
  let botH = Math.max(0, totalH - topH - rendH);

  document.getElementById('sp-top').style.height = topH + 'px';
  document.getElementById('sp-bot').style.height = botH + 'px';

  renderSlice(start, end);
}

function renderSlice(start, end) {
  const list = document.getElementById('msg-list');

  // Index existing rendered items
  const existing = {};
  list.querySelectorAll('.msg-wrap[data-mi]').forEach(el => {
    existing[el.dataset.mi] = el;
  });

  // Build new fragment, reusing DOM nodes where possible
  const frag = document.createDocumentFragment();
  for (let i = start; i < end; i++) {
    const key = String(i);
    if (existing[key]) {
      frag.appendChild(existing[key]);
      delete existing[key];
    } else {
      frag.appendChild(buildMsgEl(VS.items[i], i));
    }
  }

  // Remove stale items
  Object.values(existing).forEach(el => el.remove());

  list.innerHTML = '';
  list.appendChild(frag);

  // Measure actual heights and update estimates
  list.querySelectorAll('.msg-wrap[data-mi]').forEach(el => {
    const i = +el.dataset.mi;
    const h = el.getBoundingClientRect().height;
    if (h > 0) VS.heights[i] = h + 20;
  });
}

// ════════════════════════════════════════════════
//  BUILD MESSAGE ELEMENT
// ════════════════════════════════════════════════
function buildMsgEl(msg, idx) {
  const isHuman = msg.sender === 'human';
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${isHuman ? 'human' : 'assistant'}`;
  wrap.dataset.mi = idx;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // Sender label
  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = isHuman ? 'You' : 'Claude';
  bubble.appendChild(sender);

  // Thinking blocks (assistant only)
  if (!isHuman && Array.isArray(msg.content)) {
    let ti = 0;
    msg.content.forEach(block => {
      if (block.type === 'thinking' && block.thinking && block.thinking.trim()) {
        const key = `${idx}-${ti}`;
        const toggle = document.createElement('div');
        toggle.className = 'think-toggle' + (thinkOpen.has(key) ? ' open' : '');
        toggle.dataset.key = key;
        toggle.innerHTML = `<span class="think-arrow">▶</span> Thinking`;

        const body = document.createElement('div');
        body.className = 'think-body' + (thinkOpen.has(key) ? ' open' : '');
        body.textContent = block.thinking;

        toggle.addEventListener('click', () => {
          thinkOpen.has(key) ? thinkOpen.delete(key) : thinkOpen.add(key);
          toggle.classList.toggle('open');
          body.classList.toggle('open');
          // Re-measure height after expand/collapse
          requestAnimationFrame(() => {
            const wrap = toggle.closest('.msg-wrap[data-mi]');
            if (wrap) {
              const mi = +wrap.dataset.mi;
              const h = wrap.getBoundingClientRect().height;
              if (h > 0) VS.heights[mi] = h + 20;
              recomputeSpacers();
            }
          });
        });

        bubble.appendChild(toggle);
        bubble.appendChild(body);
        ti++;
      }
    });
  }

  // Text content
  const textDiv = document.createElement('div');
  textDiv.className = 'msg-text';
  const raw = getMsgText(msg);
  if (SR.term && SR.matches.length) {
    const activeGlobal = SR.cur >= 0 ? SR.matches[SR.cur].globalIdx : -1;
    textDiv.innerHTML = buildHighlightedHTML(raw, idx, activeGlobal);
  } else {
    textDiv.innerHTML = renderMD(raw);
  }
  bubble.appendChild(textDiv);

  // Timestamp
  if (msg.created_at) {
    const t = document.createElement('div');
    t.className = 'msg-time';
    t.textContent = fmtTime(msg.created_at);
    bubble.appendChild(t);
  }

  wrap.appendChild(bubble);
  return wrap;
}

// ════════════════════════════════════════════════
//  MARKDOWN
// ════════════════════════════════════════════════
marked.setOptions({ breaks: true, gfm: true });

function renderMD(text) {
  if (!text) return '';
  try {
    return DOMPurify.sanitize(marked.parse(text));
  } catch {
    return esc(text).replace(/\n/g, '<br>');
  }
}

// ════════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════════
function doSearch() {
  const term = document.getElementById('search-input').value.trim();
  if (!term || !activeMsgs.length) { resetSearch(); return; }

  SR.term = term;
  SR.matches = [];
  SR.msgOffset = {};
  SR.cur = -1;

  const re = new RegExp(escRe(term), 'gi');
  let globalIdx = 0;
  activeMsgs.forEach((msg, mi) => {
    const text = getMsgText(msg);
    re.lastIndex = 0;
    let m;
    let first = true;
    while ((m = re.exec(text)) !== null) {
      if (first) { SR.msgOffset[mi] = globalIdx; first = false; }
      SR.matches.push({ msgIdx: mi, globalIdx });
      globalIdx++;
    }
  });

  if (!SR.matches.length) {
    document.getElementById('search-info').textContent = '无结果';
    setNavDisabled(true);
    return;
  }

  SR.cur = 0;
  updateSearchUI();
  jumpToMatch(0);
}

function navigate(dir) {
  if (!SR.matches.length) return;
  SR.cur = (SR.cur + dir + SR.matches.length) % SR.matches.length;
  updateSearchUI();
  jumpToMatch(SR.cur);
}

function resetSearch() {
  SR.term = '';
  SR.matches = [];
  SR.msgOffset = {};
  SR.cur = -1;
  const inp = document.getElementById('search-input');
  if (inp) inp.value = '';
  document.getElementById('search-info').textContent = '';
  setNavDisabled(true);
}

function updateSearchUI() {
  document.getElementById('search-info').textContent =
    `${SR.cur + 1} / ${SR.matches.length}`;
  setNavDisabled(false);
}

function setNavDisabled(v) {
  document.getElementById('prev-btn').disabled = v;
  document.getElementById('next-btn').disabled = v;
}

function jumpToMatch(matchIdx) {
  const m = SR.matches[matchIdx];
  if (!m) return;
  const mi = m.msgIdx;

  // Scroll container so this message is centered in view
  let top = 0;
  for (let i = 0; i < mi; i++) top += VS.heights[i];
  const c = document.getElementById('msg-container');
  const center = top - c.clientHeight / 2 + VS.heights[mi] / 2;
  c.scrollTop = Math.max(0, center);

  // Re-render visible slice (builds new items with correct active highlight)
  renderVS();

  // For already-rendered (reused) items, update the active mark in place
  requestAnimationFrame(() => updateActiveMarks());
}

// ════════════════════════════════════════════════
//  HIGHLIGHT IN RENDERED HTML
// ════════════════════════════════════════════════
function buildHighlightedHTML(rawText, msgIdx, activeGlobalIdx) {
  const html = renderMD(rawText);
  if (!SR.term) return html;

  const div = document.createElement('div');
  div.innerHTML = html;

  const offset = SR.msgOffset[msgIdx] !== undefined ? SR.msgOffset[msgIdx] : 0;
  const state = { localIdx: 0 };
  const re = new RegExp(escRe(SR.term), 'gi');

  walkTextNodes(div, re, offset, activeGlobalIdx, state);
  return div.innerHTML;
}

function walkTextNodes(node, re, offset, activeGlobal, state) {
  if (node.nodeType === Node.TEXT_NODE) {
    const text = node.textContent;
    re.lastIndex = 0;
    if (!re.test(text)) return;
    re.lastIndex = 0;

    const frag = document.createDocumentFragment();
    let last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const mark = document.createElement('mark');
      const gIdx = offset + state.localIdx;
      mark.className = 'hl' + (gIdx === activeGlobal ? ' cur' : '');
      mark.dataset.gidx = gIdx;   // store for updateActiveMarks
      mark.textContent = m[0];
      frag.appendChild(mark);
      state.localIdx++;
      last = re.lastIndex;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  } else if (node.nodeType === Node.ELEMENT_NODE && !['SCRIPT','STYLE','MARK'].includes(node.tagName)) {
    Array.from(node.childNodes).forEach(c => walkTextNodes(c, re, offset, activeGlobal, state));
  }
}

// Update which mark has `.cur` without rebuilding DOM (used after navigation)
function updateActiveMarks() {
  document.querySelectorAll('mark.hl.cur').forEach(m => m.classList.remove('cur'));
  if (SR.cur < 0 || !SR.matches.length) return;
  const gIdx = SR.matches[SR.cur].globalIdx;
  const mark = document.querySelector(`mark.hl[data-gidx="${gIdx}"]`);
  if (mark) {
    mark.classList.add('cur');
    mark.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

// ════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════
// Recompute spacers after height change (e.g. thinking expand) without re-rendering items
function recomputeSpacers() {
  const n = VS.heights.length;
  if (!n) return;
  let topH = 0;
  for (let i = 0; i < VS.start; i++) topH += VS.heights[i];
  let totalH = VS.heights.reduce((a, b) => a + b, 0);
  let rendH = 0;
  for (let i = VS.start; i < VS.end; i++) rendH += VS.heights[i];
  let botH = Math.max(0, totalH - topH - rendH);
  document.getElementById('sp-top').style.height = topH + 'px';
  document.getElementById('sp-bot').style.height = botH + 'px';
}

function getMsgText(msg) {
  if (Array.isArray(msg.content)) {
    const blocks = msg.content.filter(b => b.type === 'text');
    if (blocks.length) return blocks.map(b => b.text || '').join('\n\n');
  }
  return msg.text || '';
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  } catch { return iso; }
}

function pad(n) { return String(n).padStart(2,'0'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

window.addEventListener('resize', () => { if (activeMsgs.length) renderVS(); });
